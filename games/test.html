
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#app{width:100%;min-height:580px;background:#0d0d1a;color:#fff;font-family:'Segoe UI',sans-serif;position:relative;overflow:hidden;}
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:580px;padding:2rem;gap:1.5rem;}
#lobby h2{font-size:22px;font-weight:500;color:#c9b8ff;letter-spacing:1px;}
#pseudo-input{background:rgba(255,255,255,0.08);border:0.5px solid rgba(180,150,255,0.4);border-radius:8px;color:#fff;font-size:15px;padding:10px 16px;width:260px;outline:none;transition:border 0.2s;}
#pseudo-input:focus{border-color:rgba(180,150,255,0.8);}
#play-btn{background:rgba(130,80,255,0.8);color:#fff;border:none;border-radius:8px;padding:11px 36px;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.2s,transform 0.1s;}
#play-btn:hover{background:rgba(130,80,255,1);}
#play-btn:active{transform:scale(0.97);}
.lobby-stats{display:flex;gap:24px;margin-top:8px;}
.stat-pill{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:6px 16px;font-size:13px;color:rgba(255,255,255,0.7);}
.stat-pill span{color:#b8f5c8;font-weight:500;}
#game-screen{display:none;width:100%;min-height:580px;position:relative;background:#0d0d1a;}
#canvas{display:block;cursor:none;}
#hud{position:absolute;top:0;left:0;right:0;height:44px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;padding:0 16px;gap:16px;border-bottom:0.5px solid rgba(255,255,255,0.1);}
#my-tag{font-size:13px;font-weight:500;letter-spacing:0.5px;}
#sidebar{position:absolute;top:44px;right:0;width:180px;height:calc(100% - 44px);background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);border-left:0.5px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;padding:12px;gap:12px;overflow:hidden;}
.side-section{background:rgba(255,255,255,0.05);border-radius:6px;padding:8px 10px;}
.side-title{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.side-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;}
.side-label{color:rgba(255,255,255,0.5);}
.side-val{font-weight:500;color:#fff;}
#ping-val{color:#b8f5c8;}
#leaderboard-list{display:flex;flex-direction:column;gap:4px;}
.lb-row{display:flex;align-items:center;gap:6px;font-size:12px;}
.lb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.8);}
.lb-score{color:#ffd97d;font-weight:500;font-size:11px;}
#controls-hint{position:absolute;bottom:8px;left:calc(50% - 90px);font-size:11px;color:rgba(255,255,255,0.3);}
</style>

<div id="app">
<div id="lobby">
  <div style="font-size:32px;margin-bottom:-8px;">🎮</div>
  <h2>PIXEL TRAIL — multijoueur</h2>
  <input id="pseudo-input" placeholder="Ton pseudo..." maxlength="16" autocomplete="off"/>
  <button id="play-btn">Jouer</button>
  <div class="lobby-stats">
    <div class="stat-pill">Ping <span id="lobby-ping">—</span> ms</div>
    <div class="stat-pill"><span id="lobby-players">—</span> joueur(s) en ligne</div>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:-4px;">ZQSD ou flèches pour se déplacer · laisse ta trace</div>
</div>

<div id="game-screen">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="my-tag"></div>
    <div style="flex:1"></div>
    <button onclick="quitGame()" style="background:rgba(255,60,60,0.2);border:0.5px solid rgba(255,60,60,0.4);color:rgba(255,120,120,0.9);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;">Quitter</button>
  </div>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="sidebar">
    <div class="side-section">
      <div class="side-title">Connexion</div>
      <div class="side-row"><span class="side-label">Ping</span><span class="side-val" id="ping-val">— ms</span></div>
      <div class="side-row"><span class="side-label">Joueurs</span><span class="side-val" id="players-val">—</span></div>
      <div class="side-row"><span class="side-label">Statut</span><span class="side-val" id="status-val" style="font-size:11px;">—</span></div>
    </div>
    <div class="side-section" style="flex:1;overflow:hidden;">
      <div class="side-title">Classement (cases)</div>
      <div id="leaderboard-list"></div>
    </div>
  </div>
  <div id="controls-hint">ZQSD / flèches · la carte est infinie</div>
</div>
</div>

<script>
const PROJECT_ID = "1234567890";
const CLOUD_VAR = "☁ score";
const TILE = 20;
const CANVAS_W = () => Math.max(400, window.innerWidth - 180);
const CANVAS_H = () => Math.max(536, window.innerHeight - 44);

const COLORS = ["#e05c5c","#e08c3c","#d4c03a","#5ccc6c","#3cc8d8","#5c8ce0","#b05ce0","#e05ca0","#60e0b0","#e0a050"];

let me = null, ws = null, wsOK = false;
let players = {}, trailData = {}, myTrailCount = 0;
let camX = 0, camY = 0;
let keys = {};
let pingMs = 0, pingStart = 0, pingInterval = null;
let canvas, ctx, animFrame;
let moveTimer = 0;
let gameRunning = false;

function genId(){ return "#"+(Math.floor(Math.random()*0xFFFFF)).toString(16).toUpperCase().padStart(5,"0"); }
function pickColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }
function tileKey(tx,ty){ return tx+","+ty; }

function savePseudo(p){ try{localStorage.setItem("pixeltrail_pseudo",p);}catch(e){} }
function loadPseudo(){ try{return localStorage.getItem("pixeltrail_pseudo")||"";}catch(e){return "";} }

window.addEventListener("DOMContentLoaded",()=>{
  const inp = document.getElementById("pseudo-input");
  const saved = loadPseudo();
  if(saved) inp.value = saved;

  startLobbyPing();

  document.getElementById("play-btn").onclick = startGame;
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter") startGame(); });
});

function startLobbyPing(){
  wsLobby();
}

let lobbyWs = null;
function wsLobby(){
  try{
    lobbyWs = new WebSocket("wss://clouddata.turbowarp.org");
    lobbyWs.onopen=()=>{
      lobbyWs.send(JSON.stringify({method:"handshake",project_id:PROJECT_ID,user:"lobby_"+Math.random()}));
      pingLobby();
    };
    lobbyWs.onmessage=(e)=>{
      try{
        const lines=e.data.split("\n");
        for(const l of lines){
          if(!l.trim()) continue;
          const d=JSON.parse(l);
          if(d.method==="set" && d.name==="☁ players"){
            document.getElementById("lobby-players").textContent = parseInt(d.value)||"0";
          }
          if(d.method==="pong"||d.method==="set"){
            const now=Date.now();
            if(pingStart>0){ pingMs=now-pingStart; pingStart=0; document.getElementById("lobby-ping").textContent=pingMs; }
          }
        }
      }catch(err){}
    };
  }catch(e){}
}

function pingLobby(){
  setInterval(()=>{
    pingStart=Date.now();
    if(lobbyWs&&lobbyWs.readyState===1){
      lobbyWs.send(JSON.stringify({method:"set",name:"☁ ping_probe",value:String(pingStart),project_id:PROJECT_ID,user:"lobby"}));
    }
  },2000);
}

function startGame(){
  let pseudo = document.getElementById("pseudo-input").value.trim();
  if(!pseudo){ pseudo = "Joueur"+(Math.floor(Math.random()*999)+1); }
  savePseudo(pseudo);

  const uid = genId();
  const color = pickColor();
  const username = pseudo + uid;

  me = {
    pseudo: pseudo,
    uid: uid,
    username: username,
    color: color,
    x: 0, y: 0,
    tx: 0, ty: 0
  };

  document.getElementById("my-tag").innerHTML =
    `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};border:1.5px solid #fff;margin-right:8px;vertical-align:middle;"></span>`+
    `<span style="color:${color};font-weight:500;">${pseudo}</span>`+
    `<span style="color:rgba(255,255,255,0.4);font-size:11px;margin-left:4px;">${uid}</span>`;

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  canvas = document.getElementById("canvas");
  ctx = canvas.getContext("2d");
  resizeCanvas();

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("keydown", e=>{ keys[e.key]=true; e.preventDefault&&["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)&&e.preventDefault(); });
  window.addEventListener("keyup", e=>{ keys[e.key]=false; });

  connectWS();
  gameRunning = true;
  gameLoop(0);

  pingInterval = setInterval(sendPing,2000);
}

function resizeCanvas(){
  if(!canvas) return;
  canvas.width = CANVAS_W();
  canvas.height = CANVAS_H();
}

function connectWS(){
  try{
    ws = new WebSocket("wss://clouddata.turbowarp.org");
    ws.onopen=()=>{
      ws.send(JSON.stringify({method:"handshake",project_id:PROJECT_ID,user:me.username}));
      wsOK=true;
      updateStatus("🟢 Cloud");
      broadcastMe();
      sendPing();
    };
    ws.onmessage=handleWS;
    ws.onclose=()=>{
      wsOK=false;
      updateStatus("🔴 Déco...");
      if(gameRunning) setTimeout(connectWS,2000);
    };
    ws.onerror=()=>{
      wsOK=false;
      updateStatus("🟡 Local");
    };
  }catch(e){ wsOK=false; updateStatus("🟡 Local"); }
}

function handleWS(event){
  const lines = event.data.split("\n");
  for(const line of lines){
    if(!line.trim()) continue;
    try{
      const d = JSON.parse(line);
      if(d.method==="set"){
        const n = d.name, v = d.value;
        if(n.startsWith("☁ p_") && !n.includes(me.uid)){
          try{
            const pd = JSON.parse(v);
            if(pd && pd.uid){
              if(!players[pd.uid]) players[pd.uid]={};
              Object.assign(players[pd.uid], pd);
            }
          }catch(e){}
        }
        if(n.startsWith("☁ t_")){
          try{
            const td = JSON.parse(v);
            if(td && td.uid && td.uid!==me.uid && td.tiles){
              if(!trailData[td.uid]) trailData[td.uid]={color:td.color,tiles:{}};
              trailData[td.uid].color=td.color;
              Object.assign(trailData[td.uid].tiles, td.tiles);
            }
          }catch(e){}
        }
        if(n==="☁ players"){
          document.getElementById("players-val").textContent = v;
        }
        if(n.startsWith("☁ pong_")&&n.includes(me.uid)){
          const t=parseInt(v)||0;
          pingMs=Date.now()-t;
          document.getElementById("ping-val").textContent=pingMs+" ms";
          document.getElementById("lobby-ping").textContent=pingMs;
        }
      }
    }catch(err){}
  }
}

function sendCloud(name,value){
  if(wsOK&&ws&&ws.readyState===1){
    ws.send(JSON.stringify({method:"set",name,value:String(value),project_id:PROJECT_ID,user:me.username}));
  }
}

let broadcastTimer=0;
let myLocalTrail={};

function broadcastMe(){
  const data = JSON.stringify({uid:me.uid,pseudo:me.pseudo,color:me.color,tx:me.tx,ty:me.ty,score:myTrailCount});
  sendCloud("☁ p_"+me.uid, data);
}

function broadcastTrail(){
  const data = JSON.stringify({uid:me.uid,color:me.color,tiles:myLocalTrail});
  sendCloud("☁ t_"+me.uid, data);
}

function sendPing(){
  const t=Date.now();
  sendCloud("☁ pong_"+me.uid, String(t));
  pingStart=t;
}

let lastTime=0, moveAcc=0;
const MOVE_INTERVAL=120;
const SPEED=4;

function gameLoop(ts){
  if(!gameRunning) return;
  const dt = ts-lastTime; lastTime=ts;

  handleInput(dt);
  render();
  updateLeaderboard();

  broadcastTimer+=dt;
  if(broadcastTimer>500){ broadcastTimer=0; broadcastMe(); }

  animFrame = requestAnimationFrame(gameLoop);
}

function handleInput(dt){
  if(!me) return;
  moveAcc+=dt;
  if(moveAcc<MOVE_INTERVAL) return;
  moveAcc=0;

  let dx=0,dy=0;
  if(keys["z"]||keys["Z"]||keys["ArrowUp"]) dy=-1;
  if(keys["s"]||keys["S"]||keys["ArrowDown"]) dy=1;
  if(keys["q"]||keys["Q"]||keys["ArrowLeft"]) dx=-1;
  if(keys["d"]||keys["D"]||keys["ArrowRight"]) dx=1;

  if(dx!==0||dy!==0){
    me.tx+=dx; me.ty+=dy;
    me.x=me.tx*TILE; me.y=me.ty*TILE;
    const k=tileKey(me.tx,me.ty);
    if(!myLocalTrail[k]){
      myLocalTrail[k]=1;
      myTrailCount++;
    }
    broadcastMe();
    broadcastTrail();
  }

  camX = me.x - canvas.width/2 + TILE/2;
  camY = me.y - canvas.height/2 + TILE/2;
}

function hexToRgba(hex, alpha){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function render(){
  if(!canvas||!ctx) return;
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle="#0d0d1a";
  ctx.fillRect(0,0,W,H);

  const startTX=Math.floor(camX/TILE)-1, startTY=Math.floor(camY/TILE)-1;
  const endTX=startTX+Math.ceil(W/TILE)+2, endTY=startTY+Math.ceil(H/TILE)+2;

  ctx.strokeStyle="rgba(255,255,255,0.04)";
  ctx.lineWidth=0.5;
  for(let tx=startTX;tx<=endTX;tx++){
    const sx=tx*TILE-camX;
    ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,H); ctx.stroke();
  }
  for(let ty=startTY;ty<=endTY;ty++){
    const sy=ty*TILE-camY;
    ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
  }

  for(let tx=startTX;tx<=endTX;tx++){
    for(let ty=startTY;ty<=endTY;ty++){
      const k=tileKey(tx,ty);
      const sx=tx*TILE-camX, sy=ty*TILE-camY;
      if(myLocalTrail[k]){
        ctx.fillStyle=hexToRgba(me.color,0.28);
        ctx.fillRect(sx,sy,TILE,TILE);
      }
      for(const uid in trailData){
        if(trailData[uid].tiles[k]){
          ctx.fillStyle=hexToRgba(trailData[uid].color,0.28);
          ctx.fillRect(sx,sy,TILE,TILE);
        }
      }
    }
  }

  for(const uid in players){
    const p=players[uid];
    if(!p||typeof p.tx==="undefined") continue;
    const sx=p.tx*TILE-camX, sy=p.ty*TILE-camY;
    ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,7,0,Math.PI*2);
    ctx.fillStyle=p.color||"#aaa";
    ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.font="11px Segoe UI";
    ctx.textAlign="center";
    ctx.fillText((p.pseudo||"?").substring(0,10),sx+TILE/2,sy-4);
  }

  if(me){
    const sx=me.tx*TILE-camX, sy=me.ty*TILE-camY;
    ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,8,0,Math.PI*2);
    ctx.fillStyle=me.color;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle="#fff";
    ctx.font="bold 11px Segoe UI";
    ctx.textAlign="center";
    ctx.fillText(me.pseudo.substring(0,12),sx+TILE/2,sy-5);
  }
}

function updateLeaderboard(){
  const entries=[];
  if(me) entries.push({pseudo:me.pseudo,uid:me.uid,color:me.color,score:myTrailCount});
  for(const uid in players){
    const p=players[uid];
    if(p&&p.pseudo) entries.push({pseudo:p.pseudo,uid:p.uid||uid,color:p.color||"#aaa",score:parseInt(p.score)||0});
  }
  entries.sort((a,b)=>b.score-a.score);
  const list=document.getElementById("leaderboard-list");
  list.innerHTML=entries.slice(0,8).map((e,i)=>
    `<div class="lb-row"><div class="lb-dot" style="background:${e.color}"></div><span class="lb-name">${e.pseudo}</span><span class="lb-score">${e.score}</span></div>`
  ).join("");
  document.getElementById("players-val").textContent = entries.length;
}

function updateStatus(s){ const el=document.getElementById("status-val"); if(el) el.textContent=s; }

window.quitGame = function(){
  gameRunning=false;
  cancelAnimationFrame(animFrame);
  clearInterval(pingInterval);
  if(ws) ws.close();
  players={}; trailData={}; myLocalTrail={}; myTrailCount=0; me=null; keys={};
  document.getElementById("game-screen").style.display="none";
  document.getElementById("lobby").style.display="flex";
  startLobbyPing();
};
</script>
