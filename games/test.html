<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PixelTrail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:monospace;overflow:hidden;user-select:none}
#cv{display:block;image-rendering:pixelated}
#hud{position:fixed;top:8px;right:8px;background:#0009;border:1px solid #333;border-radius:6px;padding:8px 12px;font-size:11px;min-width:140px}
#hud h3{font-size:10px;color:#888;margin-bottom:6px;letter-spacing:1px}
.hr{display:flex;justify-content:space-between;gap:12px;margin:2px 0}
.hv{color:#4cf}
#sc{position:fixed;bottom:8px;right:8px;background:#0009;border:1px solid #333;border-radius:6px;padding:8px 12px;font-size:11px;min-width:140px}
#sc h3{font-size:10px;color:#888;margin-bottom:6px;letter-spacing:1px}
.sr{display:flex;justify-content:space-between;gap:8px;margin:2px 0;align-items:center}
.sd{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
#mc{position:fixed;bottom:8px;left:8px;border-radius:50%;border:2px solid #333;background:#0009}
#lb{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10}
#lb h1{font-size:2em;letter-spacing:4px;color:#4cf}
#lb input{background:#1a1a1a;border:1px solid #444;color:#eee;padding:8px 14px;font-family:monospace;font-size:14px;border-radius:4px;width:200px;text-align:center;outline:none}
#lb input:focus{border-color:#4cf}
#lb button{background:#4cf;color:#111;border:none;padding:8px 24px;font-family:monospace;font-size:14px;border-radius:4px;cursor:pointer;font-weight:bold;letter-spacing:1px}
#lb button:hover{background:#7df}
#st{font-size:11px;color:#888;height:14px}
/* indicateur de direction tactile */
#tap-hint{position:fixed;pointer-events:none;border-radius:50%;width:54px;height:54px;border:2px solid #4cf6;background:#4cf1;display:none;transform:translate(-50%,-50%);transition:opacity 0.25s;}
@media(pointer:coarse){#tap-hint{display:block;opacity:0;}}

/* ━━ CHAT GLOBAL ━━ */
#chat-wrap{position:fixed;left:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:row;align-items:flex-start;gap:0;z-index:20;}
#chat-toggle{background:#0009;border:1px solid #333;border-radius:0 6px 6px 0;padding:10px 5px;font-size:10px;color:#888;cursor:pointer;letter-spacing:1px;user-select:none;display:flex;flex-direction:column;align-items:center;gap:4px;writing-mode:vertical-rl;white-space:nowrap;order:2;}
#chat-toggle:hover{color:#4cf;}
#chat-panel{display:flex;flex-direction:column;width:210px;transition:transform .25s ease,opacity .25s ease;transform-origin:left center;order:1;}
#chat-panel.hidden{transform:translateX(-220px);opacity:0;pointer-events:none;position:absolute;}
#chat-panel.visible{transform:translateX(0);opacity:1;}
#chat-body{background:#0009;border:1px solid #333;border-radius:6px 0 0 6px;display:flex;flex-direction:column;overflow:hidden;}
#chat-msgs{flex:1;overflow-y:auto;padding:6px 8px;font-size:10px;line-height:1.5;display:flex;flex-direction:column;gap:2px;min-height:0;max-height:200px;}
#chat-msgs::-webkit-scrollbar{width:3px;}
#chat-msgs::-webkit-scrollbar-thumb{background:#333;}
.chat-msg{word-break:break-word;animation:msgIn .15s ease;}
@keyframes msgIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:none;}}
#chat-input-row{display:flex;border-top:1px solid #222;padding:5px 6px;gap:5px;}
#chat-in{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:3px;color:#eee;font-family:monospace;font-size:10px;padding:3px 6px;outline:none;}
#chat-in:focus{border-color:#4cf;}
#chat-send{background:#4cf;color:#111;border:none;border-radius:3px;padding:3px 8px;font-family:monospace;font-size:10px;cursor:pointer;font-weight:bold;}
#chat-send:hover{background:#7df;}
</style>
</head>
<body>

<div id="lb">
  <h1>PIXEL TRAIL</h1>
  <input id="ni" placeholder="Pseudo" maxlength="12">
  <button id="pb">JOUER</button>
  <div id="st">En attente...</div>
</div>

<canvas id="cv"></canvas>

<div id="hud">
  <h3>STATS</h3>
  <div class="hr"><span>Score</span><span class="hv" id="hs">0</span></div>
  <div class="hr"><span>Tiles</span><span class="hv" id="ht">0</span></div>
  <div class="hr"><span>Joueurs</span><span class="hv" id="hp">1</span></div>
</div>

<div id="sc">
  <h3>CLASSEMENT</h3>
  <div id="sl"></div>
</div>

<canvas id="mc" width="110" height="110"></canvas>

<div id="tap-hint"></div>

<!-- CHAT GLOBAL -->
<div id="chat-wrap">
  <div id="chat-panel" class="visible">
    <div id="chat-body">
      <div id="chat-msgs"></div>
      <div id="chat-input-row">
        <input id="chat-in" placeholder="Message..." maxlength="60">
        <button id="chat-send">▶</button>
      </div>
    </div>
  </div>
  <div id="chat-toggle">💬 <span id="chat-arrow">◀</span></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIG
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CFG = {
  PROJECT_ID: "YOUR_PROJECT_ID", // <- remplacer
  TILE:  20,   // px par tuile
  MOVE:  150,  // ms entre deplacements
  SEG:   80,   // tuiles par segment cloud
  SLOTS: 8,    // joueurs max simultanes
  MAP_W: 100,  // largeur carte (tuiles)
  MAP_H: 75,   // hauteur carte (tuiles)
};

const COLORS = ["#e74c3c","#3498db","#f39c12","#2ecc71","#9b59b6","#1abc9c","#e67e22","#e91e63"];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ENCODAGE 100% NUMERIQUE (obligatoire TurboWarp)
//
// Variable position  P{slot} :
//   XXXYYYSSSSSSSSS
//   XXX     = x     (3 chiffres, 000-999)
//   YYY     = y     (3 chiffres, 000-999)
//   SSSSSSSSS = score (9 chiffres)
//
// Variable trail  T{slot} :
//   IIIICCCXXXYYYY[d...]
//   IIII    = index segment (4 chiffres)
//   CCC     = nb tuiles dans segment (3 chiffres)
//   XXX YYY = coord absolue de la 1ere tuile (anchor)
//   d       = deltas suivants : 1=R 2=L 3=D 4=U (1 chiffre chacun)
//   => ~80 tuiles = ~110 chars, tres en dessous de la limite 100000
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const PAD = (n,d) => String(Math.max(0,Math.min(n,Math.pow(10,d)-1))|0).padStart(d,"0");

function encodePosMsg(x,y,sc) {
  return PAD(x,3)+PAD(y,3)+PAD(sc,9);
}
function decodePosMsg(v) {
  if(!v||v.length<15) return null;
  const x=parseInt(v.slice(0,3)), y=parseInt(v.slice(3,6)), sc=parseInt(v.slice(6,15));
  if(isNaN(x)||isNaN(y)) return null;
  return {x,y,score:sc||0};
}

// Deltas : 1=droite 2=gauche 3=bas 4=haut
const DXDY = {1:[1,0],2:[-1,0],3:[0,1],4:[0,-1]};

function encodeTrailSeg(segIdx, tiles) {
  if(!tiles.length) return "";
  let s = PAD(segIdx,4)+PAD(tiles.length,3)+PAD(tiles[0].x,3)+PAD(tiles[0].y,3);
  for(let i=1;i<tiles.length;i++){
    const ddx=tiles[i].x-tiles[i-1].x, ddy=tiles[i].y-tiles[i-1].y;
    if(ddx===1 &&ddy===0) s+="1";
    else if(ddx===-1&&ddy===0) s+="2";
    else if(ddx===0 &&ddy===1) s+="3";
    else if(ddx===0 &&ddy===-1) s+="4";
    else s+="0"; // non adjacent (ne devrait pas arriver)
  }
  return s;
}

function decodeTrailSeg(v) {
  if(!v||v.length<13) return null;
  const segIdx=parseInt(v.slice(0,4));
  const count=parseInt(v.slice(4,7));
  const ax=parseInt(v.slice(7,10));
  const ay=parseInt(v.slice(10,13));
  if(isNaN(segIdx)||isNaN(count)||isNaN(ax)||isNaN(ay)) return null;
  const tiles=[{x:ax,y:ay}];
  for(let i=13;i<v.length&&tiles.length<count;i++){
    const d=parseInt(v[i]);
    const dir=DXDY[d];
    if(!dir) continue;
    const last=tiles[tiles.length-1];
    tiles.push({x:last.x+dir[0],y:last.y+dir[1]});
  }
  return {segIdx,tiles};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ENCODAGE CHAT
// Variable MSG{slot} :
//   TTTTT + chars ASCII 3 digits chacun
//   TTTTT = timestamp mod 99999 (anti-doublon)
// Variable N{slot} : pseudo encodé ASCII 3 digits
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function encodeChatMsg(text){
  const ts=PAD(Date.now()%99999,5);
  let enc=ts;
  for(let i=0;i<Math.min(text.length,60);i++) enc+=PAD(text.charCodeAt(i),3);
  return enc;
}
function decodeChatMsg(v){
  if(!v||v.length<8) return null;
  let text="";
  for(let i=5;i+2<v.length;i+=3){
    const code=parseInt(v.slice(i,i+3));
    if(code>=32&&code<127) text+=String.fromCharCode(code);
  }
  return text||null;
}
function encodeName(name){
  let enc="";
  for(let i=0;i<Math.min(name.length,16);i++) enc+=PAD(name.charCodeAt(i),3);
  return enc||"0";
}
function decodeName(v){
  if(!v||v==="0"||v.length<3) return null;
  let name="";
  for(let i=0;i+2<v.length;i+=3){
    const code=parseInt(v.slice(i,i+3));
    if(code>=32&&code<127) name+=String.fromCharCode(code);
  }
  return name||null;
}


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let mySlot=-1, myName="";
let px=Math.floor(CFG.MAP_W/2), py=Math.floor(CFG.MAP_H/2);
let myTrail=[];    // [{x,y}] toutes mes tuiles (local)
let slideIdx=0;    // index de rotation pour broadcastTrailSeg
let score=0;
let dx=0, dy=0;
let running=false;

// Interpolation smooth : position visuelle flottante de la camera
let camRx = Math.floor(CFG.MAP_W/2) * CFG.TILE; // camera X courant (px)
let camRy = Math.floor(CFG.MAP_H/2) * CFG.TILE; // camera Y courant (px)
const LERP = 0.14; // facteur d'interpolation (plus petit = plus smooth/lent)

const players={};   // players[slot]={x,y,score,name,color,lastSeen}

// trailSegs[slot] = Map<segIdx, [{x,y}]>
// On REMPLACE le segment a l'index recu, jamais append
const trailSegs={};

// PERF FIX : cache du trail reconstitue par slot
// Invalide uniquement quand un nouveau segment arrive
// => evite sort()+flatMap() a chaque frame (source du lag constant)
const trailCache={};  // trailCache[slot] = [{x,y}] | null

function invalidateTrailCache(slot){ trailCache[slot]=null; }

function getRemoteTrail(slot){
  if(trailCache[slot]) return trailCache[slot];
  const m=trailSegs[slot];
  if(!m||m.size===0) return (trailCache[slot]=[]);
  const sorted=[...m.keys()].sort((a,b)=>a-b);
  const out=[];
  for(const k of sorted) for(const t of m.get(k)) out.push(t);
  trailCache[slot]=out;
  return out;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLOUD WEBSOCKET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let ws=null;
const cvars={};

function cloudConnect(){
  // "player" + 2-7 chiffres aleatoires => pas de verif Scratch = connexion rapide
  const user="player"+Math.floor(10+Math.random()*9999990);
  ws=new WebSocket("wss://clouddata.turbowarp.org");
  ws.onopen=()=>{
    ws.send(JSON.stringify({method:"handshake",project_id:CFG.PROJECT_ID,user}));
    setStatus("Connecte");
  };
  ws.onmessage=e=>{
    // Plusieurs messages separes par \n possible
    for(const line of e.data.split("\n")){
      if(!line.trim()) continue;
      try{
        const d=JSON.parse(line);
        if(d.method==="set"){
          const name=d.name.replace(/^[☁] /,"").replace(/^☁ /,"");
          cvars[name]=String(d.value);
          onCloudVar(name,String(d.value));
        }
      }catch(_){}
    }
  };
  ws.onclose=e=>{
    setStatus("Deconnecte ("+e.code+")... reconnexion");
    setTimeout(cloudConnect,3000);
  };
  ws.onerror=()=>setStatus("Erreur WebSocket");
}

function cloudSet(name,val){
  // Securite : ne jamais envoyer une valeur contenant autre chose que chiffres
  const safeVal=String(val).replace(/[^0-9]/g,"");
  if(!ws||ws.readyState!==1||!safeVal) return;
  ws.send(JSON.stringify({method:"set",name:"☁ "+name,value:safeVal}));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RECEPTION CLOUD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function onCloudVar(name,val){
  // Position : P0 a P7
  if(/^P[0-9]$/.test(name)){
    const slot=parseInt(name[1]);
    if(slot===mySlot) return;
    // "0" = slot libere (joueur parti)
    if(!val||val==="0"){
      delete players[slot];
      document.getElementById("hp").textContent=Object.keys(players).length+1;
      updateSB();
      return;
    }
    const d=decodePosMsg(val);
    if(!d) return;
    if(!players[slot]) players[slot]={color:COLORS[slot%COLORS.length],name:"J"+slot};
    Object.assign(players[slot],d,{lastSeen:Date.now()});
    document.getElementById("hp").textContent=Object.keys(players).length+1;
    updateSB();
    return;
  }
  // Pseudo : N0 a N7
  if(/^N[0-9]$/.test(name)){
    const slot=parseInt(name[1]);
    if(slot===mySlot) return;
    if(!val||val==="0") return;
    const pname=decodeName(val);
    if(!pname) return;
    if(!players[slot]) players[slot]={color:COLORS[slot%COLORS.length],name:pname};
    else players[slot].name=pname;
    return;
  }
  // Trail : T0 a T7
  if(/^T[0-9]$/.test(name)){
    const slot=parseInt(name[1]);
    if(slot===mySlot) return;
    if(!val||val==="0") return;
    const r=decodeTrailSeg(val);
    if(!r) return;
    if(!trailSegs[slot]) trailSegs[slot]=new Map();
    trailSegs[slot].set(r.segIdx,r.tiles);
    invalidateTrailCache(slot);
    const maxSegs=Math.ceil(1000/CFG.SEG);
    if(trailSegs[slot].size>maxSegs+2){
      const keys=[...trailSegs[slot].keys()].sort((a,b)=>a-b);
      while(trailSegs[slot].size>maxSegs) trailSegs[slot].delete(keys.shift());
    }
  }
  // Chat : MSG0 a MSG7
  if(/^MSG[0-9]$/.test(name)){
    const slot=parseInt(name[3]);
    if(slot===mySlot) return;
    if(!val||val==="0") return;
    const text=decodeChatMsg(val);
    if(!text) return;
    const p=players[slot];
    const pname=p?p.name:("J"+slot);
    const color=COLORS[slot%COLORS.length];
    pushChatMsg(pname,color,text);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BROADCAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function broadcastPos(){
  if(mySlot<0) return;
  cloudSet("P"+mySlot, encodePosMsg(px,py,score));
  // Broadcaster le pseudo a chaque tick (permet aux nouveaux de le recevoir)
  if(myName) ws&&ws.readyState===1&&ws.send(JSON.stringify({method:"set",name:"☁ N"+mySlot,value:encodeName(myName)}));
}

function broadcastTrailSeg(){
  if(mySlot<0||myTrail.length===0) return;
  const totalSegs=Math.ceil(myTrail.length/CFG.SEG);
  const segIdx=slideIdx%totalSegs;
  slideIdx=(slideIdx+1)%totalSegs;
  const chunk=myTrail.slice(segIdx*CFG.SEG,(segIdx+1)*CFG.SEG);
  cloudSet("T"+mySlot, encodeTrailSeg(segIdx,chunk));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAMEPLAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startGame(){
  running=true;
  myTrail.push({x:px,y:py});

  setInterval(()=>{
    if(!running) return;
    // Mouvement
    if(dx||dy){
      const nx=px+dx, ny=py+dy;
      if(nx>=0&&nx<CFG.MAP_W&&ny>=0&&ny<CFG.MAP_H){
        px=nx; py=ny;
        myTrail.push({x:px,y:py});
        score++;
        document.getElementById("hs").textContent=score;
        document.getElementById("ht").textContent=myTrail.length;
      }
    }
    // NE PAS supprimer les joueurs inactifs ici :
    // la deconnexion se fait uniquement a la fermeture de fenetre (beforeunload)
    // => les joueurs AFK restent visibles avec leur trail intact
    broadcastPos();
    broadcastTrailSeg();
    updateSB();
  }, CFG.MOVE);

  requestAnimationFrame(render);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDU
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const mc=document.getElementById("mc");
const mctx=mc.getContext("2d");
const T=CFG.TILE;

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize(); window.addEventListener("resize",resize);

// Camera interpolee (smooth)
const camX=()=>camRx-cv.width/2;
const camY=()=>camRy-cv.height/2;

function drawTile(tx,ty,color,alpha){
  const sx=tx*T-camX(), sy=ty*T-camY();
  if(sx<-T||sx>cv.width||sy<-T||sy>cv.height) return;
  ctx.globalAlpha=alpha??1;
  ctx.fillStyle=color;
  ctx.fillRect(sx+1,sy+1,T-2,T-2);
}

function render(){
  if(!running){requestAnimationFrame(render);return;}

  // Mise a jour smooth de la camera vers la position logique du joueur
  const targetX = px*T;
  const targetY = py*T;
  camRx += (targetX - camRx) * LERP;
  camRy += (targetY - camRy) * LERP;

  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.globalAlpha=1;

  // Grille
  ctx.strokeStyle="#ffffff07";ctx.lineWidth=1;
  const ox=(-camX())%T, oy=(-camY())%T;
  for(let x=ox;x<cv.width;x+=T){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=oy;y<cv.height;y+=T){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}

  // Trails distants
  for(const s in players){
    const trail=getRemoteTrail(parseInt(s));
    for(const t of trail) drawTile(t.x,t.y,players[s].color,0.45);
  }
  ctx.globalAlpha=1;

  // Mon trail
  const myColor=COLORS[mySlot<0?0:mySlot];
  for(const t of myTrail) drawTile(t.x,t.y,myColor,0.6);
  ctx.globalAlpha=1;

  // Joueurs distants
  ctx.textAlign="center";ctx.font="9px monospace";
  for(const s in players){
    const p=players[s];
    const sx=p.x*T-camX()+T/2, sy=p.y*T-camY()+T/2;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(sx,sy,T/2-1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name||"J"+s,sx,sy-T/2-3);
  }

  // Mon joueur (position visuelle = centre de l'ecran + offset sub-pixel smooth)
  const snapX = cv.width/2 + (px*T - camRx) + T/2;
  const snapY = cv.height/2 + (py*T - camRy) + T/2;
  const sx=snapX, sy=snapY;
  ctx.fillStyle=myColor;
  ctx.beginPath();ctx.arc(sx,sy,T/2-1,0,Math.PI*2);ctx.fill();
  if(dx||dy){
    ctx.strokeStyle=myColor;ctx.lineWidth=2;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(sx,sy,T,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }

  drawMinimap();
  requestAnimationFrame(render);
}

function drawMinimap(){
  const W=110,R=W/2;
  mctx.clearRect(0,0,W,W);
  mctx.save();
  mctx.beginPath();mctx.arc(R,R,R-1,0,Math.PI*2);mctx.clip();
  mctx.fillStyle="#000a";mctx.fillRect(0,0,W,W);
  const sc=W/Math.max(CFG.MAP_W,CFG.MAP_H);
  const toM=(tx,ty)=>[(tx-px)*sc+R,(ty-py)*sc+R];
  const myColor=COLORS[mySlot<0?0:mySlot];

  // Trails
  mctx.globalAlpha=0.4;
  for(const t of myTrail){const[mx,my]=toM(t.x,t.y);mctx.fillStyle=myColor;mctx.fillRect(mx,my,1.5,1.5);}
  for(const s in players){
    const trail=getRemoteTrail(parseInt(s));
    mctx.fillStyle=players[s].color;
    for(const t of trail){const[mx,my]=toM(t.x,t.y);mctx.fillRect(mx,my,1.5,1.5);}
  }
  mctx.globalAlpha=1;

  // Points joueurs
  for(const s in players){const[mx,my]=toM(players[s].x,players[s].y);mctx.fillStyle=players[s].color;mctx.beginPath();mctx.arc(mx,my,3,0,Math.PI*2);mctx.fill();}
  mctx.fillStyle=myColor;mctx.beginPath();mctx.arc(R,R,4,0,Math.PI*2);mctx.fill();
  mctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCOREBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateSB(){
  const list=[{name:myName,score,color:COLORS[mySlot<0?0:mySlot]}];
  for(const s in players) list.push({name:players[s].name,score:players[s].score||0,color:players[s].color});
  list.sort((a,b)=>b.score-a.score);
  document.getElementById("sl").innerHTML=list.slice(0,6).map(p=>
    `<div class="sr"><span><span class="sd" style="background:${p.color}"></span>${p.name}</span><span>${p.score}</span></div>`
  ).join("");
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COMMANDE ADMIN CACHEE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function adminNuke(){
  if(!ws||ws.readyState!==1) return;

  // Flash rouge a l'ecran
  const flash=document.createElement("div");
  flash.style.cssText="position:fixed;inset:0;background:#f003;z-index:999;pointer-events:none;transition:opacity 0.8s";
  document.body.appendChild(flash);
  setTimeout(()=>{flash.style.opacity="0";},50);
  setTimeout(()=>{flash.remove();},900);

  // Kick tous les slots (P0-P7 = "0", T0-T7 = "0")
  for(let i=0;i<CFG.SLOTS;i++){
    if(i===mySlot) continue; // ne pas se kicker soi-meme
    ws.send(JSON.stringify({method:"set",name:"☁ P"+i,value:"0"}));
    ws.send(JSON.stringify({method:"set",name:"☁ T"+i,value:"0"}));
  }

  // Reset local : vider les joueurs et trails distants
  for(const s in players) delete players[s];
  for(const s in trailSegs) delete trailSegs[s];
  for(const s in trailCache) delete trailCache[s];

  // Reset son propre trail aussi
  myTrail=[{x:px,y:py}];
  score=0;
  slideIdx=0;
  document.getElementById("hs").textContent=0;
  document.getElementById("ht").textContent=1;
  document.getElementById("hp").textContent=1;
  updateSB();

  console.log("%c[ADMIN] NUKE executed — all players kicked, trails reset","color:#f44;font-weight:bold");
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONTROLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const KEYS={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1],
            a:[-1,0],d:[1,0],w:[0,-1],s:[0,1],q:[-1,0],z:[0,-1]};
document.addEventListener("keydown",e=>{
  // ━━ COMMANDE CACHEE : CTRL+ALT+S = kick all + reset trails ━━
  if(e.ctrlKey && e.altKey && e.key==="s"){
    e.preventDefault();
    adminNuke();
    return;
  }
  if(!running) return;
  const d=KEYS[e.key];
  if(d){dx=d[0];dy=d[1];e.preventDefault();}
});
document.addEventListener("keyup",e=>{
  const d=KEYS[e.key];
  if(d&&d[0]===dx&&d[1]===dy){dx=0;dy=0;}
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONTROLES TACTILES — tap directionnel
// Le joueur est toujours au centre de l'ecran.
// On calcule l'angle entre le centre et le doigt
// et on en deduit la direction (haut/bas/gauche/droite).
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tapHint=document.getElementById("tap-hint");
let tapHintTimer=null;

function showTapHint(cx,cy){
  tapHint.style.left=cx+"px";
  tapHint.style.top=cy+"px";
  tapHint.style.opacity="1";
  clearTimeout(tapHintTimer);
  tapHintTimer=setTimeout(()=>{tapHint.style.opacity="0";},300);
}

cv.addEventListener("touchstart",e=>{
  if(!running) return;
  e.preventDefault();
  handleTap(e.touches[0]);
},{passive:false});

cv.addEventListener("touchmove",e=>{
  if(!running) return;
  e.preventDefault();
  handleTap(e.touches[0]);
},{passive:false});

cv.addEventListener("touchend",e=>{
  e.preventDefault();
  dx=0; dy=0; // stop quand le doigt se leve
},{passive:false});

cv.addEventListener("touchcancel",()=>{ dx=0; dy=0; },{passive:true});

function handleTap(touch){
  // Centre de l'ecran = position visuelle du joueur
  const screenCx = cv.width  / 2;
  const screenCy = cv.height / 2;
  const relX = touch.clientX - screenCx;
  const relY = touch.clientY - screenCy;

  // Deadzone : si le doigt est trop pres du centre, on ignore
  if(Math.abs(relX) < 12 && Math.abs(relY) < 12) return;

  // Direction : on prend l'axe dominant (plus grand delta)
  if(Math.abs(relX) > Math.abs(relY)){
    dx = relX > 0 ? 1 : -1;
    dy = 0;
  } else {
    dx = 0;
    dy = relY > 0 ? 1 : -1;
  }

  showTapHint(touch.clientX, touch.clientY);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHAT GLOBAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const chatMsgs=document.getElementById("chat-msgs");
const chatIn=document.getElementById("chat-in");
const chatPanel=document.getElementById("chat-panel");
const chatArrow=document.getElementById("chat-arrow");
let chatVisible=true;

document.getElementById("chat-toggle").addEventListener("click",()=>{
  chatVisible=!chatVisible;
  chatPanel.className=chatVisible?"visible":"hidden";
  chatArrow.textContent=chatVisible?"◀":"▶";
});

// Empeche les touches de jeu quand on tape dans le chat
chatIn.addEventListener("keydown",e=>e.stopPropagation());
chatIn.addEventListener("keyup",e=>e.stopPropagation());

function pushChatMsg(name,color,text,isMine=false){
  const div=document.createElement("div");
  div.className="chat-msg";
  // format : pseudo#id : "message"
  const escaped=text.replace(/</g,"&lt;").replace(/>/g,"&gt;");
  div.innerHTML=`<span style="color:${color};font-weight:bold">${name}</span><span style="color:#555"> : </span><span style="color:#ddd">${escaped}</span>`;
  chatMsgs.appendChild(div);
  // Garder max 60 messages
  while(chatMsgs.children.length>60) chatMsgs.removeChild(chatMsgs.firstChild);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
  // Ouvrir le chat si ferme et nouveau message entrant
  if(!isMine&&!chatVisible){
    chatVisible=true;
    chatPanel.className="visible";
    chatArrow.textContent="◀";
  }
}

function sendChatMsg(){
  const text=chatIn.value.trim();
  if(!text||mySlot<0||!ws||ws.readyState!==1) return;
  chatIn.value="";
  const enc=encodeChatMsg(text);
  ws.send(JSON.stringify({method:"set",name:"☁ MSG"+mySlot,value:enc}));
  // Afficher son propre message immediatement
  const myColor=COLORS[mySlot<0?0:mySlot];
  pushChatMsg(myName,myColor,text,true);
}

document.getElementById("chat-send").addEventListener("click",sendChatMsg);
chatIn.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); sendChatMsg(); }});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DECONNEXION PROPRE (fermeture fenetre uniquement)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// On efface le slot cloud quand la fenetre se ferme
// => les autres joueurs voient la disparition en ~10s (timeout lastSeen)
window.addEventListener("beforeunload",()=>{
  if(mySlot>=0&&ws&&ws.readyState===1){
    // Envoyer "0" = slot libre
    ws.send(JSON.stringify({method:"set",name:"☁ P"+mySlot,value:"0"}));
    ws.send(JSON.stringify({method:"set",name:"☁ T"+mySlot,value:"0"}));
    ws.send(JSON.stringify({method:"set",name:"☁ MSG"+mySlot,value:"0"}));
    ws.send(JSON.stringify({method:"set",name:"☁ N"+mySlot,value:"0"}));
  }
});
function setStatus(msg){document.getElementById("st").textContent=msg;}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOBBY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById("pb").addEventListener("click",()=>{
  const raw=(document.getElementById("ni").value.trim()||"Player").slice(0,12);
  // Tag #xxx aleatoire => 2 joueurs meme pseudo ne se confondent pas
  const tag="#"+String(Math.floor(100+Math.random()*900));
  myName=raw+tag;
  setStatus("Connexion...");
  cloudConnect();
  const trySlot=()=>{
    if(!ws||ws.readyState!==1){setTimeout(trySlot,200);return;}
    // Cherche un slot libre (var P{n} absente ou vide)
    mySlot=-1;
    for(let i=0;i<CFG.SLOTS;i++){
      if(!cvars["P"+i]||cvars["P"+i]==="0"){mySlot=i;break;}
    }
    if(mySlot<0) mySlot=Math.floor(Math.random()*CFG.SLOTS);
    document.getElementById("lb").style.display="none";
    startGame();
  };
  setTimeout(trySlot,1200);
});
document.getElementById("ni").addEventListener("keydown",e=>{
  if(e.key==="Enter") document.getElementById("pb").click();
});
</script>
